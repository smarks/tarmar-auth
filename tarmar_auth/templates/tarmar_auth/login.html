{% extends "tarmar_auth/base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post">{% csrf_token %}{{ form.as_p }}
  <button type="submit">Log in</button>
</form>
<p>No account? <a href="{% url 'tarmar_auth:register' %}">Create one</a>.</p>
{% endblock %}
